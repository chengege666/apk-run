name: Build & Release

on:
  workflow_dispatch:
  push:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - version: "24.10.6"
            url: "https://archive.openwrt.org/releases/24.10.6/targets/x86/64/openwrt-sdk-24.10.6-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - version: "25.12.3"
            url: "https://downloads.openwrt.org/releases/25.12.3/targets/x86/64/openwrt-sdk-25.12.3-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 unzip file wget rsync zstd

      - name: Download OpenWrt SDK ${{ matrix.sdk.version }}
        run: |
          echo "Downloading ${{ matrix.sdk.url }}"
          wget -q "${{ matrix.sdk.url }}" -O sdk.tar.zst
          tar --zstd -xf sdk.tar.zst
          mv openwrt-sdk-* sdk

      - name: Copy package to SDK
        run: |
          cp -r luci-app-run sdk/package/

      - name: Update feeds
        run: |
          cd sdk
          ./scripts/feeds update -a

      - name: Build package
        run: |
          cd sdk
          make defconfig
          make package/luci-app-run/compile V=s -j$(nproc)

      - name: Collect packages
        run: |
          mkdir -p dist
          find sdk/bin -type f \( -name "*.ipk" -o -name "*.apk" \) -exec cp -v {} dist/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-run-${{ matrix.sdk.version }}
          path: dist/

  release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist-all -type f -exec cp -v {} release/ \;

      - name: Create release tag
        id: tag
        run: |
          echo "tag=v$(date -u +%Y.%m.%d)" >> $GITHUB_OUTPUT

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: luci-app-run ${{ steps.tag.outputs.tag }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
