name: Build & Release
run-name: >-
  luci-app-run${{ github.ref_type == 'tag' && format(' {0}', github.ref_name) || '' }}

on:
  workflow_dispatch:
  push:
    branches: [master, main]
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        sdk:
          - version: "24.10.6"
            url: "https://archive.openwrt.org/releases/24.10.6/targets/x86/64/openwrt-sdk-24.10.6-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst"
          - version: "25.12.3"
            url: "https://downloads.openwrt.org/releases/25.12.3/targets/x86/64/openwrt-sdk-25.12.3-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Delete previous workflow runs & artifacts
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            console.log(`Cleaning old completed runs for ${owner}/${repo}...`);

            try {
              const { data: workflow } = await github.rest.actions.getWorkflow({
                owner, repo,
                workflow_id: '.github/workflows/main.yml'
              });
              const { data: runs } = await github.rest.actions.listWorkflowRuns({
                owner, repo,
                workflow_id: workflow.id,
                status: 'completed',
                per_page: 30
              });
              for (const run of runs.workflow_runs) {
                if (run.id >= context.runId) continue;
                try {
                  const { data: artifacts } = await github.rest.actions.listWorkflowRunArtifacts({
                    owner, repo, run_id: run.id
                  });
                  for (const art of artifacts.artifacts) {
                    await github.rest.actions.deleteArtifact({ owner, repo, artifact_id: art.id });
                  }
                  await github.rest.actions.deleteWorkflowRun({ owner, repo, run_id: run.id });
                  console.log(`Deleted run #${run.id}`);
                } catch (e) {
                  console.log(`Skip run #${run.id}: ${e.message}`);
                }
              }
            } catch (e) {
              console.log(`Cleanup skipped (first run or API error): ${e.message}`);
            }

      - name: Install deps
        run: |
          sudo apt update
          sudo apt install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses5-dev libssl-dev \
            python3 unzip file wget rsync zstd

      - name: Download OpenWrt SDK ${{ matrix.sdk.version }}
        run: |
          echo "Downloading ${{ matrix.sdk.url }}"
          wget -q "${{ matrix.sdk.url }}" -O sdk.tar.zst
          tar --zstd -xf sdk.tar.zst
          mv openwrt-sdk-* sdk

      - name: Copy package to SDK
        run: |
          cp -r luci-app-run sdk/package/

      - name: Update feeds
        run: |
          cd sdk
          ./scripts/feeds update -a

      - name: Build package
        run: |
          cd sdk
          make defconfig
          make package/luci-app-run/compile V=s -j$(nproc)

      - name: Collect packages
        run: |
          mkdir -p dist
          find sdk/bin -type f \( -name "*.ipk" -o -name "*.apk" \) -exec cp -v {} dist/ \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-run-${{ matrix.sdk.version }}
          path: dist/

  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    steps:
      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "name=v$(date -u +%Y.%m.%d)" >> $GITHUB_OUTPUT
          else
            echo "name=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-all

      - name: Flatten artifacts
        run: |
          mkdir -p release
          find dist-all -type f -exec cp -v {} release/ \;

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: luci-app-run ${{ steps.tag.outputs.name }}
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
